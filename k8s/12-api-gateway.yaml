apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: currency-monitor
  labels:
    app: api-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: API_GATEWAY_IMAGE
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ReverseProxy__Clusters__rates-cluster__Destinations__rates__Address
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ReverseProxy__Clusters__rates-cluster__Destinations__rates__Address
            - name: ReverseProxy__Clusters__alerts-cluster__Destinations__alerts__Address
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ReverseProxy__Clusters__alerts-cluster__Destinations__alerts__Address
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: currency-monitor
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: 8080
