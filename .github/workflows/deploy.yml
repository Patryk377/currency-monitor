name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  CLUSTER_NAME: currency-monitor-cluster
  ECR_REGISTRY: 513386726239.dkr.ecr.eu-central-1.amazonaws.com
  PROJECT: currency-monitor

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::513386726239:role/currency-monitor-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push - RatesService
        run: |
          IMAGE=$ECR_REGISTRY/$PROJECT/rates-service:$GITHUB_SHA
          docker build -t $IMAGE backend/RatesService
          docker push $IMAGE
          echo "RATES_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Build and push - AlertsService
        run: |
          IMAGE=$ECR_REGISTRY/$PROJECT/alerts-service:$GITHUB_SHA
          docker build -t $IMAGE backend/AlertsService
          docker push $IMAGE
          echo "ALERTS_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Build and push - ApiGateway
        run: |
          IMAGE=$ECR_REGISTRY/$PROJECT/api-gateway:$GITHUB_SHA
          docker build -t $IMAGE backend/ApiGateway
          docker push $IMAGE
          echo "GATEWAY_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Build and push - Frontend
        run: |
          IMAGE=$ECR_REGISTRY/$PROJECT/frontend:$GITHUB_SHA
          docker build -t $IMAGE frontend
          docker push $IMAGE
          echo "FRONTEND_IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION

      - name: Substitute image placeholders
        run: |
          sed -i "s|RATES_SERVICE_IMAGE|$RATES_IMAGE|g" k8s/10-rates-service.yaml
          sed -i "s|ALERTS_SERVICE_IMAGE|$ALERTS_IMAGE|g" k8s/11-alerts-service.yaml
          sed -i "s|API_GATEWAY_IMAGE|$GATEWAY_IMAGE|g" k8s/12-api-gateway.yaml
          sed -i "s|FRONTEND_IMAGE|$FRONTEND_IMAGE|g" k8s/13-frontend.yaml

      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s/00-namespace.yaml
          kubectl apply -f k8s/01-configmap.yaml
          kubectl apply -f k8s/10-rates-service.yaml
          kubectl apply -f k8s/11-alerts-service.yaml
          kubectl apply -f k8s/12-api-gateway.yaml
          kubectl apply -f k8s/13-frontend.yaml
          kubectl apply -f k8s/20-ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl -n currency-monitor rollout status deployment/rates-service --timeout=5m
          kubectl -n currency-monitor rollout status deployment/alerts-service --timeout=5m
          kubectl -n currency-monitor rollout status deployment/api-gateway --timeout=5m
          kubectl -n currency-monitor rollout status deployment/frontend --timeout=5m